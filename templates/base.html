<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Student Management System</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

</head>

<body>

    <!-- Navbar -->

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">

        <div class="container">

            <a class="navbar-brand fw-bold"
               href="/">
                Student Management System
            </a>

            <button class="navbar-toggler"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#navbarNav">

                <span class="navbar-toggler-icon"></span>

            </button>

            <div class="collapse navbar-collapse"
                 id="navbarNav">

                <ul class="navbar-nav ms-auto">

                    <li class="nav-item">
                        <a class="nav-link"
                           href="/">
                            Dashboard
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link"
                           href="/courses/">
                            Courses
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link"
                           href="/teachers/">
                            Teachers
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link"
                           href="/attendance/">
                            Attendance
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link"
                           href="/results/">
                            Results
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link"
                           href="/admin/">
                            Admin
                        </a>
                    </li>

                    {% if user.is_authenticated %}

                    <li class="nav-item">
                        <span class="nav-link">
                            Welcome, {{ user.username }}
                        </span>
                    </li>

                    <li class="nav-item">
                        <form action="{% url 'logout' %}"
                              method="post">

                            {% csrf_token %}

                            <button type="submit"
                                    class="btn btn-danger btn-sm mt-1 ms-2">

                                Logout

                            </button>

                        </form>
                    </li>

                    {% else %}

                    <li class="nav-item">
                        <a class="nav-link"
                           href="{% url 'login' %}">
                            Login
                        </a>
                    </li>

                    {% endif %}

                </ul>

            </div>

        </div>

    </nav>

    <!-- Main Content -->

    <div class="container mt-4">

        {% block content %}
        {% endblock %}

    </div>

    <!-- Bootstrap JS -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
