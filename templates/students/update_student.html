{% extends 'base.html' %}

{% block content %}

<div class="card shadow">

    <div class="card-header bg-warning">
        <h3>Update Student</h3>
    </div>

    <div class="card-body">

        <form method="POST">

            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit"
                    class="btn btn-primary">

                Update Student

            </button>

            <a href="/"
               class="btn btn-secondary">

                Back

            </a>

        </form>

    </div>

</div>

{% endblock %}
